name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            runner: windows-latest
            rust-target: x86_64-pc-windows-msvc
          - name: linux-x64
            runner: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
          - name: linux-arm64
            runner: ubuntu-22.04-arm
            rust-target: aarch64-unknown-linux-gnu
          - name: macos-arm64
            runner: macos-latest
            rust-target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux dependencies
        if: startsWith(matrix.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            xdg-utils \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test:frontend

      - name: Build and publish Tauri bundle
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: "-"
        with:
          args: --target ${{ matrix.rust-target }}
          tagName: ${{ github.ref_name }}
          releaseName: "zTerm ${{ github.ref_name }}"
          releaseBody: "Automated zTerm release for ${{ github.ref_name }}."
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          updaterJsonPreferNsis: true

  normalize-updater-json:
    name: Normalize updater JSON URLs
    runs-on: ubuntu-latest
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Replace GitHub API asset URLs with release download URLs
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const tag = context.ref.replace("refs/tags/", "");
            const release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            const assets = await github.paginate(github.rest.repos.listReleaseAssets, {
              owner,
              repo,
              release_id: release.data.id,
              per_page: 100,
            });
            const latestAsset = assets.find((asset) => asset.name === "latest.json");
            if (!latestAsset) {
              throw new Error("latest.json release asset was not found");
            }

            const latestResponse = await github.request("GET /repos/{owner}/{repo}/releases/assets/{asset_id}", {
              owner,
              repo,
              asset_id: latestAsset.id,
              headers: { accept: "application/octet-stream" },
            });
            const latestJson = Buffer.from(latestResponse.data).toString("utf8");
            const latest = JSON.parse(latestJson);
            const assetNames = new Set(assets.map((asset) => asset.name));
            const downloadableAssetNames = assets
              .map((asset) => asset.name)
              .filter((name) => name !== "latest.json" && !name.endsWith(".sig"));

            function getUpdaterSuffix(fileName) {
              const suffixes = [".app.tar.gz", ".AppImage", ".deb", ".rpm", "-setup.exe", ".msi"];
              return suffixes.find((suffix) => fileName.endsWith(suffix));
            }

            function getPlatformArchHints(platformName) {
              if (platformName.includes("aarch64")) {
                return ["aarch64", "arm64"];
              }
              if (platformName.includes("x86_64")) {
                return ["x86_64", "amd64", "x64"];
              }
              return [];
            }

            function resolveReleaseAssetName(platformName, signatureFileName) {
              if (assetNames.has(signatureFileName)) {
                return signatureFileName;
              }

              const suffix = getUpdaterSuffix(signatureFileName);
              if (!suffix) {
                throw new Error(`No release asset named ${signatureFileName} was found`);
              }

              const suffixMatches = downloadableAssetNames.filter((name) => name.endsWith(suffix));
              const archHints = getPlatformArchHints(platformName);
              const archMatches = suffixMatches.filter((name) => archHints.some((hint) => name.includes(hint)));
              if (archMatches.length === 1) {
                return archMatches[0];
              }
              if (suffixMatches.length === 1) {
                return suffixMatches[0];
              }

              throw new Error(
                `Could not map ${platformName} signature file ${signatureFileName} to one release asset. ` +
                  `Candidates: ${suffixMatches.join(", ") || "none"}`,
              );
            }

            for (const [platformName, platform] of Object.entries(latest.platforms ?? {})) {
              if (!platform || typeof platform !== "object" || typeof platform.signature !== "string") {
                continue;
              }
              const signatureText = Buffer.from(platform.signature, "base64").toString("utf8");
              const fileName = signatureText.match(/(?:^|\t)file:([^\r\n]+)/)?.[1];
              if (!fileName) {
                throw new Error(`Could not determine updater artifact filename from signature: ${signatureText}`);
              }
              const releaseAssetName = resolveReleaseAssetName(platformName, fileName);
              platform.url = `https://github.com/${owner}/${repo}/releases/download/${tag}/${encodeURIComponent(releaseAssetName)}`;
            }

            const normalized = `${JSON.stringify(latest, null, 2)}\n`;
            await github.rest.repos.deleteReleaseAsset({
              owner,
              repo,
              asset_id: latestAsset.id,
            });
            await github.rest.repos.uploadReleaseAsset({
              owner,
              repo,
              release_id: release.data.id,
              name: "latest.json",
              data: Buffer.from(normalized),
              headers: {
                "content-type": "application/json",
                "content-length": Buffer.byteLength(normalized),
              },
            });
